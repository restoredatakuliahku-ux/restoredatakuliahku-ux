name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # setiap hari jam 00:00 UTC
  workflow_dispatch:        # bisa trigger manual dari GitHub Actions tab
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # 1. Isometric Commit Calendar (full year)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Jakarta

      # 2. Languages Activity (indepth)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          config_timezone: Asia/Jakarta

      # 3. Achievements (compact — cocok tema "ACHIEVEMENTS UNLOCKED")
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          config_timezone: Asia/Jakarta

      # 4. Coding Habits & Activity Charts
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          config_timezone: Asia/Jakarta
